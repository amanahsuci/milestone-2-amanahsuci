<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="number_game_style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bytesized&display=swap" rel="stylesheet"> 
    <title>Document</title>
</head>
<body>
    <!-- GAME AREA -->
    <h1 id="numberGame">Guessing Number Game</h1>
    <div id="main">
        <div id="gameBoard">
            <div class="game-container">
                <label for="playerInput">Guess a number between 1 and 100:</label>
                <input type="number" id="playerInput" min="1" max="100">
                <button id="submitPlayerBtn">Guess!</button>
                <p id="messageDisplay"></p>
                <h4 id="stepCounter">Chance to guess : 5</h4>
            </div>
        </div>
        <div id="buttonArea">
            <button id="restartBtn">Restart Game</button>
            <button id="stopBtn">Stop Game</button>
            <button id="backToHomeBtn">Back to Home</button> 
        </div>
    </div>
    <section class="footer">
        <p>Copyright &copy; 2025 revofun.inc</p>
        <p>All rights reserved.</p>
    </section>
    <script src="number_game.js"></script>
</body>
</html>
